version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpassword
      POSTGRES_DB: jobcompare
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobcompare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    command: node src/services/api.js
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://jobuser:jobpassword@postgres:5432/jobcompare
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./output:/app/output
      - ./benchmarking:/app/benchmarking

  cron-worker:
    build:
      context: .
    command: node src/services/cron-worker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://jobuser:jobpassword@postgres:5432/jobcompare
      WORKER_ID: cron-worker-1
      ADVISORY_LOCK_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue-worker-1:
    build:
      context: .
    command: node src/services/queue-worker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://jobuser:jobpassword@postgres:5432/jobcompare
      REDIS_URL: redis://redis:6379
      WORKER_ID: queue-worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  queue-worker-2:
    build:
      context: .
    command: node src/services/queue-worker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://jobuser:jobpassword@postgres:5432/jobcompare
      REDIS_URL: redis://redis:6379
      WORKER_ID: queue-worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
